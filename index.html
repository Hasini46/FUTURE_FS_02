<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini CRM — Lead Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0f14;
  --surface:#13181f;
  --surface2:#1a2030;
  --border:#1f2937;
  --border2:#2d3748;
  --text:#e2e8f0;
  --muted:#64748b;
  --accent:#6366f1;
  --accent2:#818cf8;
  --green:#10b981;
  --yellow:#f59e0b;
  --red:#ef4444;
  --blue:#3b82f6;
  --purple:#8b5cf6;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(99,102,241,0.12),transparent);pointer-events:none;z-index:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px;width:100%;max-width:420px;box-shadow:0 0 60px rgba(99,102,241,0.1)}
.auth-logo{font-size:2rem;font-weight:800;color:var(--accent2);letter-spacing:-1px;margin-bottom:8px}
.auth-sub{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:2px;margin-bottom:40px}
.auth-label{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:8px}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:12px 16px;font-family:'Syne',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;margin-bottom:20px}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--muted)}
.btn{padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;font-size:0.9rem;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-sm{padding:6px 14px;font-size:0.8rem;border-radius:6px}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--green)}
.btn-success:hover{background:rgba(16,185,129,0.2)}
.auth-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;font-family:'DM Mono',monospace}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;position:relative;z-index:1}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column}
.sidebar-logo{font-size:1.3rem;font-weight:800;color:var(--accent2);letter-spacing:-0.5px;padding:0 24px 24px;border-bottom:1px solid var(--border)}
.sidebar-logo span{color:var(--muted);font-weight:400;font-size:0.75rem;display:block;font-family:'DM Mono',monospace;margin-top:2px}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:0.9rem;font-weight:600;transition:all 0.2s;margin-bottom:4px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,0.15);color:var(--accent2)}
.nav-icon{font-size:1.1rem;width:20px;text-align:center}
.sidebar-user{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.user-info{font-size:0.8rem}
.user-name{color:var(--text);font-weight:600}
.user-role{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:1px}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;transition:color 0.2s}
.logout-btn:hover{color:var(--red)}

/* MAIN */
.main{overflow-y:auto;height:100vh}
.topbar{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:100}
.page-title{font-size:1.4rem;font-weight:800;letter-spacing:-0.5px}
.page-sub{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:1px;margin-top:2px}
.content{padding:32px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.blue::before{background:var(--blue)}
.stat-card.green::before{background:var(--green)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-card.purple::before{background:var(--purple)}
.stat-num{font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.stat-label{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:1px}
.stat-icon{position:absolute;top:16px;right:16px;font-size:1.5rem;opacity:0.3}

/* FILTERS */
.filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search-input{background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 16px;font-family:'Syne',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;flex:1;min-width:200px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.filter-select{background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 14px;font-family:'Syne',sans-serif;font-size:0.88rem;outline:none;cursor:pointer}
.filter-select option{background:var(--surface2)}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-head{display:grid;grid-template-columns:2fr 2fr 1.2fr 1.2fr 1fr 1.5fr;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
.table-head span{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.table-row{display:grid;grid-template-columns:2fr 2fr 1.2fr 1.2fr 1fr 1.5fr;padding:16px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.15s;cursor:pointer}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--surface2)}
.lead-name{font-weight:700;font-size:0.95rem}
.lead-email{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem;margin-top:2px}
.lead-company{color:var(--muted);font-size:0.85rem}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:0.5px;font-family:'DM Mono',monospace}
.badge::before{content:'';width:6px;height:6px;border-radius:50%}
.badge-new{background:rgba(59,130,246,0.15);color:var(--blue)}
.badge-new::before{background:var(--blue)}
.badge-contacted{background:rgba(245,158,11,0.15);color:var(--yellow)}
.badge-contacted::before{background:var(--yellow)}
.badge-converted{background:rgba(16,185,129,0.15);color:var(--green)}
.badge-converted::before{background:var(--green)}
.badge-lost{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-lost::before{background:var(--red)}
.source-badge{background:var(--surface2);border:1px solid var(--border2);color:var(--muted);padding:3px 10px;border-radius:20px;font-size:0.7rem;font-family:'DM Mono',monospace}
.row-actions{display:flex;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:4px;border-radius:4px;transition:all 0.15s}
.icon-btn:hover{color:var(--text);background:var(--border)}
.icon-btn.del:hover{color:var(--red)}
.empty-state{padding:60px;text-align:center;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:12px;opacity:0.3}
.empty-text{font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:1px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1.1rem;font-weight:800}
.modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.3rem;transition:color 0.2s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:28px}
.modal-footer{padding:20px 28px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.form-input,.form-select,.form-textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 14px;font-family:'Syne',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
.form-select{cursor:pointer}
.form-select option{background:var(--surface2)}
.form-textarea{resize:vertical;min-height:80px}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted)}

/* DETAIL PANEL */
.detail-wrap{padding:32px}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px}
.detail-name{font-size:1.8rem;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.detail-email{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.85rem}
.detail-actions{display:flex;gap:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.detail-card-title{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:2px;color:var(--muted);margin-bottom:16px;text-transform:uppercase}
.detail-field{margin-bottom:12px}
.detail-field-label{font-size:0.75rem;color:var(--muted);margin-bottom:3px;font-family:'DM Mono',monospace}
.detail-field-val{font-size:0.95rem;font-weight:600}
.status-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;font-family:'Syne',sans-serif;font-size:0.9rem;outline:none;cursor:pointer;width:100%}

/* NOTES */
.notes-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
.notes-title{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:2px;color:var(--muted);margin-bottom:16px;text-transform:uppercase}
.note-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.note-text{font-size:0.9rem;line-height:1.6;flex:1}
.note-date{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);white-space:nowrap;margin-top:2px}
.note-add{display:flex;gap:10px;margin-top:16px}
.note-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 14px;font-family:'Syne',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s}
.note-input:focus{border-color:var(--accent)}
.note-input::placeholder{color:var(--muted)}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;font-size:0.85rem;margin-bottom:24px;padding:0;transition:color 0.2s}
.back-btn:hover{color:var(--text)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:0.88rem;font-weight:600;z-index:2000;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.toast-success{border-color:rgba(16,185,129,0.4);color:var(--green)}
.toast-error{border-color:rgba(239,68,68,0.4);color:var(--red)}

/* LOADING */
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .table-head,.table-row{grid-template-columns:2fr 1.5fr 1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = 'http://localhost:5000/api';

// ── helpers ──────────────────────────────────────────
function getToken() { return localStorage.getItem('crm_token'); }
function setToken(t) { localStorage.setItem('crm_token', t); }
function clearToken() { localStorage.removeItem('crm_token'); localStorage.removeItem('crm_user'); }

async function apiFetch(path, options = {}) {
  const token = getToken();
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    ...options
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'API Error');
  return data;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function StatusBadge({ status }) {
  const map = { new: 'New', contacted: 'Contacted', converted: 'Converted', lost: 'Lost' };
  return <span className={`badge badge-${status}`}>{map[status] || status}</span>;
}

// ── Toast ─────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast toast-${type}`}>{type === 'success' ? '✅' : '❌'} {msg}</div>;
}

// ── Auth Screen ───────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
      setToken(data.token);
      localStorage.setItem('crm_user', data.username);
      onLogin(data.username);
    } catch (e) { setErr(e.message); }
    setLoading(false);
  }

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">⬡ MiniCRM</div>
        <div className="auth-sub">LEAD MANAGEMENT SYSTEM</div>
        {err && <div className="auth-err">⚠ {err}</div>}
        <form onSubmit={handleLogin}>
          <label className="auth-label">Username</label>
          <input className="auth-input" value={username} onChange={e => setUsername(e.target.value)} placeholder="admin" required/>
          <label className="auth-label">Password</label>
          <input className="auth-input" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required/>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? <span className="spinner"/> : 'Sign In →'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Add / Edit Lead Modal ─────────────────────────────
function LeadModal({ lead, onClose, onSave }) {
  const blank = { name:'', email:'', phone:'', company:'', source:'Website', status:'new', followUpDate:'' };
  const [form, setForm] = useState(lead ? {
    ...lead,
    followUpDate: lead.followUpDate ? lead.followUpDate.split('T')[0] : ''
  } : blank);
  const [loading, setLoading] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function handleSubmit(e) {
    e.preventDefault(); setLoading(true);
    try {
      if (lead) {
        await apiFetch(`/leads/${lead._id}`, { method: 'PUT', body: JSON.stringify(form) });
      } else {
        await apiFetch('/leads', { method: 'POST', body: JSON.stringify(form) });
      }
      onSave();
    } catch (e) { alert(e.message); }
    setLoading(false);
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">{lead ? 'Edit Lead' : 'Add New Lead'}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-grid">
              <div className="form-group">
                <label className="form-label">Full Name *</label>
                <input className="form-input" value={form.name} onChange={e => set('name', e.target.value)} placeholder="Jane Smith" required/>
              </div>
              <div className="form-group">
                <label className="form-label">Email *</label>
                <input className="form-input" type="email" value={form.email} onChange={e => set('email', e.target.value)} placeholder="jane@example.com" required/>
              </div>
              <div className="form-group">
                <label className="form-label">Phone</label>
                <input className="form-input" value={form.phone} onChange={e => set('phone', e.target.value)} placeholder="+91 9999999999"/>
              </div>
              <div className="form-group">
                <label className="form-label">Company</label>
                <input className="form-input" value={form.company} onChange={e => set('company', e.target.value)} placeholder="Acme Corp"/>
              </div>
              <div className="form-group">
                <label className="form-label">Source</label>
                <select className="form-select" value={form.source} onChange={e => set('source', e.target.value)}>
                  {['Website','LinkedIn','Referral','Email','Other'].map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Status</label>
                <select className="form-select" value={form.status} onChange={e => set('status', e.target.value)}>
                  {['new','contacted','converted','lost'].map(s => <option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
                </select>
              </div>
              <div className="form-group full">
                <label className="form-label">Follow-up Date</label>
                <input className="form-input" type="date" value={form.followUpDate} onChange={e => set('followUpDate', e.target.value)}/>
              </div>
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary btn-sm" disabled={loading}>
              {loading ? <span className="spinner"/> : (lead ? 'Save Changes' : 'Add Lead')}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── Lead Detail ───────────────────────────────────────
function LeadDetail({ leadId, onBack, showToast }) {
  const [lead, setLead] = useState(null);
  const [note, setNote] = useState('');
  const [editing, setEditing] = useState(false);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    try { const d = await apiFetch(`/leads/${leadId}`); setLead(d); } catch(e){}
    setLoading(false);
  }, [leadId]);

  useEffect(() => { load(); }, [load]);

  async function updateStatus(status) {
    try {
      const d = await apiFetch(`/leads/${leadId}`, { method: 'PUT', body: JSON.stringify({ status }) });
      setLead(d); showToast('Status updated', 'success');
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function addNote() {
    if (!note.trim()) return;
    try {
      const d = await apiFetch(`/leads/${leadId}/notes`, { method: 'POST', body: JSON.stringify({ text: note }) });
      setLead(d); setNote(''); showToast('Note added', 'success');
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function deleteNote(noteId) {
    try {
      const d = await apiFetch(`/leads/${leadId}/notes/${noteId}`, { method: 'DELETE' });
      setLead(d); showToast('Note deleted', 'success');
    } catch(e) { showToast(e.message, 'error'); }
  }

  if (loading) return <div style={{padding:'60px',textAlign:'center'}}><span className="spinner"/></div>;
  if (!lead) return <div style={{padding:'32px'}}>Lead not found</div>;

  return (
    <div className="detail-wrap">
      {editing && <LeadModal lead={lead} onClose={() => setEditing(false)} onSave={() => { setEditing(false); load(); showToast('Lead updated','success'); }}/>}
      <button className="back-btn" onClick={onBack}>← Back to Leads</button>
      <div className="detail-header">
        <div>
          <div className="detail-name">{lead.name}</div>
          <div className="detail-email">{lead.email}</div>
          <div style={{marginTop:'10px'}}><StatusBadge status={lead.status}/></div>
        </div>
        <div className="detail-actions">
          <button className="btn btn-ghost btn-sm" onClick={() => setEditing(true)}>✏️ Edit</button>
        </div>
      </div>

      <div className="detail-grid">
        <div className="detail-card">
          <div className="detail-card-title">Contact Info</div>
          <div className="detail-field">
            <div className="detail-field-label">Phone</div>
            <div className="detail-field-val">{lead.phone || '—'}</div>
          </div>
          <div className="detail-field">
            <div className="detail-field-label">Company</div>
            <div className="detail-field-val">{lead.company || '—'}</div>
          </div>
          <div className="detail-field">
            <div className="detail-field-label">Source</div>
            <div className="detail-field-val"><span className="source-badge">{lead.source}</span></div>
          </div>
          <div className="detail-field">
            <div className="detail-field-label">Created</div>
            <div className="detail-field-val">{fmtDate(lead.createdAt)}</div>
          </div>
        </div>
        <div className="detail-card">
          <div className="detail-card-title">Update Status</div>
          <select className="status-select" value={lead.status} onChange={e => updateStatus(e.target.value)}>
            {['new','contacted','converted','lost'].map(s => <option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
          </select>
          <div style={{marginTop:'16px'}}>
            <div className="detail-field-label">Follow-up Date</div>
            <div className="detail-field-val" style={{marginTop:'4px'}}>{fmtDate(lead.followUpDate)}</div>
          </div>
        </div>
      </div>

      <div className="notes-section">
        <div className="notes-title">Notes & Follow-ups ({lead.notes.length})</div>
        {lead.notes.length === 0 && <div style={{color:'var(--muted)',fontFamily:'DM Mono,monospace',fontSize:'0.8rem'}}>No notes yet. Add one below.</div>}
        {[...lead.notes].reverse().map(n => (
          <div key={n._id} className="note-item">
            <div>
              <div className="note-text">{n.text}</div>
              <div className="note-date">{fmtDate(n.createdAt)}</div>
            </div>
            <button className="icon-btn del" onClick={() => deleteNote(n._id)} title="Delete note">🗑</button>
          </div>
        ))}
        <div className="note-add">
          <input className="note-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Add a note or follow-up..." onKeyDown={e => e.key === 'Enter' && addNote()}/>
          <button className="btn btn-success btn-sm" onClick={addNote}>+ Add</button>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────
function Dashboard({ leads }) {
  const count = s => leads.filter(l => l.status === s).length;
  return (
    <div className="stats-grid">
      <div className="stat-card blue">
        <span className="stat-icon">📋</span>
        <div className="stat-num">{leads.length}</div>
        <div className="stat-label">Total Leads</div>
      </div>
      <div className="stat-card yellow">
        <span className="stat-icon">📞</span>
        <div className="stat-num">{count('new')}</div>
        <div className="stat-label">New Leads</div>
      </div>
      <div className="stat-card purple">
        <span className="stat-icon">💬</span>
        <div className="stat-num">{count('contacted')}</div>
        <div className="stat-label">Contacted</div>
      </div>
      <div className="stat-card green">
        <span className="stat-icon">✅</span>
        <div className="stat-num">{count('converted')}</div>
        <div className="stat-label">Converted</div>
      </div>
    </div>
  );
}

// ── Leads List ────────────────────────────────────────
function LeadsList({ onView, showToast }) {
  const [leads, setLeads] = useState([]);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [sourceFilter, setSourceFilter] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editLead, setEditLead] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (search) params.set('search', search);
      if (statusFilter) params.set('status', statusFilter);
      if (sourceFilter) params.set('source', sourceFilter);
      const data = await apiFetch(`/leads?${params}`);
      setLeads(data);
    } catch(e) { showToast(e.message, 'error'); }
    setLoading(false);
  }, [search, statusFilter, sourceFilter]);

  useEffect(() => { load(); }, [load]);

  async function deleteLead(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this lead?')) return;
    try {
      await apiFetch(`/leads/${id}`, { method: 'DELETE' });
      showToast('Lead deleted', 'success');
      load();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openEdit(lead, e) {
    e.stopPropagation();
    setEditLead(lead);
    setShowModal(true);
  }

  return (
    <div>
      {(showModal) && <LeadModal
        lead={editLead}
        onClose={() => { setShowModal(false); setEditLead(null); }}
        onSave={() => { setShowModal(false); setEditLead(null); load(); showToast(editLead ? 'Lead updated' : 'Lead added', 'success'); }}
      />}

      <Dashboard leads={leads}/>

      <div className="filters">
        <input className="search-input" placeholder="🔍  Search by name, email, company..." value={search} onChange={e => setSearch(e.target.value)}/>
        <select className="filter-select" value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
          <option value="">All Status</option>
          {['new','contacted','converted','lost'].map(s => <option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
        </select>
        <select className="filter-select" value={sourceFilter} onChange={e => setSourceFilter(e.target.value)}>
          <option value="">All Sources</option>
          {['Website','LinkedIn','Referral','Email','Other'].map(s => <option key={s}>{s}</option>)}
        </select>
        <button className="btn btn-primary btn-sm" onClick={() => { setEditLead(null); setShowModal(true); }}>+ Add Lead</button>
      </div>

      <div className="table-wrap">
        <div className="table-head">
          <span>Lead</span>
          <span>Company</span>
          <span>Source</span>
          <span>Status</span>
          <span>Added</span>
          <span>Actions</span>
        </div>
        {loading ? (
          <div style={{padding:'40px',textAlign:'center'}}><span className="spinner"/></div>
        ) : leads.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">📭</div>
            <div className="empty-text">NO LEADS FOUND</div>
          </div>
        ) : leads.map(lead => (
          <div key={lead._id} className="table-row" onClick={() => onView(lead._id)}>
            <div>
              <div className="lead-name">{lead.name}</div>
              <div className="lead-email">{lead.email}</div>
            </div>
            <div className="lead-company">{lead.company || '—'}</div>
            <div><span className="source-badge">{lead.source}</span></div>
            <div><StatusBadge status={lead.status}/></div>
            <div style={{fontSize:'0.8rem',color:'var(--muted)',fontFamily:'DM Mono,monospace'}}>{fmtDate(lead.createdAt)}</div>
            <div className="row-actions" onClick={e => e.stopPropagation()}>
              <button className="icon-btn" onClick={e => openEdit(lead, e)} title="Edit">✏️</button>
              <button className="icon-btn del" onClick={e => deleteLead(lead._id, e)} title="Delete">🗑</button>
              <button className="icon-btn" onClick={() => onView(lead._id)} title="View Details">→</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(localStorage.getItem('crm_user'));
  const [page, setPage] = useState('leads');
  const [viewId, setViewId] = useState(null);
  const [toast, setToast] = useState(null);

  function showToast(msg, type = 'success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3200);
  }

  function logout() { clearToken(); setUser(null); }

  if (!user) return <AuthScreen onLogin={u => setUser(u)}/>;

  return (
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          ⬡ MiniCRM
          <span>LEAD MANAGEMENT</span>
        </div>
        <nav className="sidebar-nav">
          <div className={`nav-item ${page === 'leads' && !viewId ? 'active' : ''}`} onClick={() => { setPage('leads'); setViewId(null); }}>
            <span className="nav-icon">📋</span> All Leads
          </div>
          {viewId && (
            <div className="nav-item active">
              <span className="nav-icon">👤</span> Lead Detail
            </div>
          )}
        </nav>
        <div className="sidebar-user">
          <div className="user-info">
            <div className="user-name">{user}</div>
            <div className="user-role">ADMIN</div>
          </div>
          <button className="logout-btn" onClick={logout} title="Logout">⏻</button>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div>
            <div className="page-title">{viewId ? 'Lead Detail' : 'Leads'}</div>
            <div className="page-sub">{viewId ? 'VIEW & MANAGE LEAD' : 'MANAGE ALL LEADS'}</div>
          </div>
        </div>
        <div className="content">
          {viewId
            ? <LeadDetail leadId={viewId} onBack={() => setViewId(null)} showToast={showToast}/>
            : <LeadsList onView={id => setViewId(id)} showToast={showToast}/>
          }
        </div>
      </main>

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
